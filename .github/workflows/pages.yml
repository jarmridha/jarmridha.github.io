name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '17,47 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: jarmridha/rakib-prime-folio-fac53b50
          ref: main
          path: source-site
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: source-site/package-lock.json
      - uses: actions/configure-pages@v5
      - name: Install
        working-directory: source-site
        run: npm install
      - name: Build
        working-directory: source-site
        env:
          VITE_BASE: /
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: source-site/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
